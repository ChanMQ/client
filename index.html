<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ficus Matrix</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="status-banner hidden" id="statusBanner"></div>

    <section class="auth-screen fade-screen active" id="authScreen">
        <div class="auth-card">
            <div class="auth-brand">
                <div class="auth-logo">M</div>
                <div>
                    <h1>Ficus Matrix</h1>
                    <p>Clean Matrix Client</p>
                </div>
            </div>

            <div class="auth-tabs">
                <button class="auth-tab active" data-auth-mode="login">Вход</button>
                <button class="auth-tab" data-auth-mode="register">Регистрация</button>
            </div>

            <form class="auth-form" id="authForm">
                <label class="field">
                    <span>Homeserver URL</span>
                    <input id="authHomeserver" type="url" placeholder="https://matrix.org" required>
                </label>
                <label class="field">
                    <span>Логин / Matrix ID</span>
                    <input id="authUsername" type="text" placeholder="@user:server" required>
                </label>
                <label class="field">
                    <span>Пароль</span>
                    <input id="authPassword" type="password" placeholder="••••••••" required>
                </label>
                <div class="auth-error hidden" id="authError"></div>
                <button class="primary-btn block" id="authSubmit" type="submit">Войти</button>
            </form>
        </div>
    </section>

    <div class="app-shell fade-screen" id="appShell">

        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="search-box">
                    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input type="text" class="search-input" id="roomSearchInput" placeholder="Поиск">
                </div>
                <button class="icon-btn" id="logoutBtn" title="Выйти">
                    <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                </button>
            </div>

            <div class="tab-content" id="chatRoomsSection">
                </div>
        </aside>

        <main class="chat-area">
            <div class="chat-header hidden" id="chatHeader">
                <div class="header-info">
                    <button class="back-btn hidden" id="backBtn">
                        <svg viewBox="0 0 24 24" width="24" height="24"><polyline points="15 18 9 12 15 6"></polyline></svg>
                    </button>
                    <div class="header-avatar" id="chatHeaderAvatar">M</div>
                    <div class="header-copy">
                        <div class="header-title" id="chatHeaderTitle">Чат</div>
                        <div class="header-status" id="chatHeaderStatus">Загрузка...</div>
                    </div>
                </div>
            </div>

            <div class="messages" id="messageContainer">
                </div>

            <div class="input-area hidden" id="inputArea">
                <button class="attach-btn">
                    <svg viewBox="0 0 24 24"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
                </button>
                <textarea class="chat-input" id="chatInput" placeholder="Сообщение..." rows="1"></textarea>
                <button class="send-btn" id="sendBtn">
                    <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </main>
    </div>

    <script type="module" src="./script.js"></script>
</body>
</html>
